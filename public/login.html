<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

<header class="top-bar">
    <a href="index.html" class="logo-login">IntegralPlay</a>
    <a href="index.html" class="btn-home">Início</a>
</header>

<div class="login-container">

    <div class="login-left">
        <div class="overlay">
            <h1>IntegralPlay</h1>
            <p>Play and reserve your moment</p>
        </div>
    </div>

    <div class="login-right">
        <div class="login-box">
            <h2>Login</h2>

            <form id="form-login">
                <input type="email" id="email" placeholder="Seu email" required>
                <input type="password" id="senha" placeholder="Sua senha" required>
                <p id="msg-erro" style="color: red; display:none;"></p>
                <button type="submit">Entrar</button>
            </form>

            <div class="login-extra">
                <p>Não tem conta?</p>
                <a href="cadastro.html" class="btn-cadastro">Cadastre-se</a>
            </div>

        </div>
    </div>

</div>

<script>
    const API = 'https://integralplay-production.up.railway.app';

    const formLogin = document.getElementById('form-login');
    const msgErro   = document.getElementById('msg-erro');

    formLogin.addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        msgErro.style.display = 'none';

        try {
            const response = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });

            const dados = await response.json();

            if (!response.ok) {
                msgErro.textContent = dados.erro || 'Erro ao fazer login.';
                msgErro.style.display = 'block';
                return;
            }

            localStorage.setItem('token', dados.token);
            localStorage.setItem('usuario', JSON.stringify(dados.usuario));

            alert('Login realizado com sucesso!');

            if (dados.usuario.perfil === 'admin') {
                window.location.href = 'admin.html';
            } else if (dados.usuario.perfil === 'dono') {
                window.location.href = 'dashboard-dono.html';
            } else {
                window.location.href = 'index.html';
            }

        } catch (err) {
            msgErro.textContent = 'Erro ao conectar com o servidor.';
            msgErro.style.display = 'block';
        }
    });
</script>

</body>
</html>
