<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Reservas | IntegralPlay</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .historico-section { padding: 40px 0; min-height: 60vh; }
    .reserva-card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .reserva-info h3 { color: #0A1F44; margin-bottom: 4px; }
    .reserva-info p { color: #64748B; font-size: 14px; margin: 2px 0; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .badge-confirmada { background: #D1FAE5; color: #065F46; }
    .badge-pendente   { background: #FEF3C7; color: #92400E; }
    .badge-cancelada  { background: #FEE2E2; color: #991B1B; }
    .badge-concluida  { background: #DBEAFE; color: #1D4ED8; }
    .reserva-acoes { display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab { padding: 8px 20px; border-radius: 20px; border: 2px solid #1E88E5; background: transparent; color: #1E88E5; cursor: pointer; font-size: 14px; }
    .tab.ativo { background: #1E88E5; color: #fff; }
    .empty-msg { text-align: center; padding: 60px 20px; color: #94A3B8; }
    .pagar-btn { background: #22C55E; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .cancelar-btn { background: #EF4444; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="logo">IntegralPlay</div>
    <nav class="nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="quadras.html">Quadras</a></li>
        <li id="nav-usuario-item" style="display:none;">
          <span id="nav-usuario-nome" style="color:#fff; margin-right:10px;"></span>
          <button id="btn-logout" class="btn-login">Sair</button>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <section class="historico-section">
    <div class="container">
      <h1 class="page-title">Minhas Reservas</h1>

      <div class="tabs">
        <button class="tab ativo" data-tab="ativas">Ativas</button>
        <button class="tab" data-tab="historico">Histórico</button>
      </div>

      <div id="lista-reservas">
        <p style="color:#64748B;">Carregando reservas...</p>
      </div>

    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <p><strong>IntegralPlay</strong></p>
    <p>Contato: contato@integralplay.com</p>
    <p>Horário: 08h às 22h</p>
  </div>
</footer>

<script>
  const API = 'http://localhost:3000';
  const token = localStorage.getItem('token');
  const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');

  // Redireciona se não estiver logado
  if (!token || !usuario) {
    window.location.href = 'login.html';
  }

  // Header
  document.getElementById('nav-usuario-item').style.display = 'inline-flex';
  document.getElementById('nav-usuario-nome').textContent = `Olá, ${usuario.nome.split(' ')[0]}!`;

  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.removeItem('token');
    localStorage.removeItem('usuario');
    window.location.href = 'index.html';
  });

  // ─── TABS ─────────────────────────────────────────────────────────────────
  let tabAtual = 'ativas';

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
      tab.classList.add('ativo');
      tabAtual = tab.dataset.tab;
      carregarReservas();
    });
  });

  // ─── CARREGAR RESERVAS ────────────────────────────────────────────────────
  function carregarReservas() {
    const lista = document.getElementById('lista-reservas');
    lista.innerHTML = '<p style="color:#64748B;">Carregando...</p>';

    const rota = tabAtual === 'historico' ? '/reservas/historico' : '/reservas/minhas';

    fetch(`${API}${rota}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(r => r.json())
    .then(reservas => {
      lista.innerHTML = '';

      if (!reservas.length) {
        lista.innerHTML = `
          <div class="empty-msg">
            <p style="font-size:40px;">🏟️</p>
            <p>Nenhuma reserva encontrada.</p>
            <a href="quadras.html" class="btn-primary" style="display:inline-block; margin-top:16px;">Reservar uma quadra</a>
          </div>`;
        return;
      }

      // Filtra por tab
      const filtradas = tabAtual === 'ativas'
        ? reservas.filter(r => ['pendente', 'confirmada'].includes(r.status))
        : reservas.filter(r => ['concluida', 'cancelada'].includes(r.status));

      if (!filtradas.length) {
        lista.innerHTML = `<div class="empty-msg"><p>Nenhuma reserva nessa categoria.</p></div>`;
        return;
      }

      filtradas.forEach(r => {
        const card = document.createElement('div');
        card.className = 'reserva-card';

        const badgeClass = {
          confirmada: 'badge-confirmada',
          pendente:   'badge-pendente',
          cancelada:  'badge-cancelada',
          concluida:  'badge-concluida'
        }[r.status] || 'badge-pendente';

        const data = r.data ? new Date(r.data).toLocaleDateString('pt-BR') : '';

        card.innerHTML = `
          <div class="reserva-info">
            <h3>${r.espaco} — ${r.quadra}</h3>
            <p>🗓️ ${data} • ${r.hora_inicio?.slice(0,5)} às ${r.hora_fim?.slice(0,5)}</p>
            <p>🏃 ${r.esporte?.replace('_', ' ')}</p>
            <p>💳 R$ ${parseFloat(r.valor_total).toFixed(2)} • ${r.tipo}</p>
          </div>
          <div class="reserva-acoes">
            <span class="badge ${badgeClass}">${r.status.charAt(0).toUpperCase() + r.status.slice(1)}</span>
            ${r.status === 'pendente' ? `<button class="pagar-btn" onclick="pagarReserva(${r.id}, ${r.valor_total})">Pagar</button>` : ''}
            ${r.status === 'pendente' ? `<button class="cancelar-btn" onclick="cancelarReserva(${r.id})">Cancelar</button>` : ''}
          </div>
        `;
        lista.appendChild(card);
      });
    })
    .catch(() => {
      lista.innerHTML = '<p style="color:red;">Erro ao carregar reservas.</p>';
    });
  }

  // ─── PAGAR RESERVA ────────────────────────────────────────────────────────
  function pagarReserva(reserva_id, valor) {
    const metodo = prompt(`Pagar R$ ${parseFloat(valor).toFixed(2)}.\nEscolha o método (pix, cartao, boleto):`);
    if (!metodo || !['pix', 'cartao', 'boleto'].includes(metodo.toLowerCase())) {
      alert('Método inválido. Use: pix, cartao ou boleto.');
      return;
    }

    fetch(`${API}/pagamentos`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ reserva_id, metodo: metodo.toLowerCase() })
    })
    .then(r => r.json())
    .then(dados => {
      if (dados.erro) {
        alert('Erro: ' + dados.erro);
      } else {
        alert('✅ ' + dados.mensagem);
        carregarReservas();
      }
    })
    .catch(() => alert('Erro ao processar pagamento.'));
  }

  // ─── CANCELAR RESERVA ────────────────────────────────────────────────────
  function cancelarReserva(reserva_id) {
    if (!confirm('Tem certeza que deseja cancelar essa reserva?')) return;

    fetch(`${API}/reservas/${reserva_id}/cancelar`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(r => r.json())
    .then(dados => {
      if (dados.erro) {
        alert('Erro: ' + dados.erro);
      } else {
        alert('✅ ' + dados.mensagem);
        carregarReservas();
      }
    })
    .catch(() => alert('Erro ao cancelar reserva.'));
  }

  // Carrega ao abrir
  carregarReservas();
</script>

</body>
</html>
