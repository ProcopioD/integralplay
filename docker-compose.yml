version: '3.8'

services:
  # ─── BANCO DE DADOS: MYSQL ──────────────────────────────────────────────────
  quadras-db:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aluguel_quadras
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── SUA API NODE.JS ────────────────────────────────────────────────────────
  quadras-api:
    build: .
    container_name: api-container
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      quadras-db:
        condition: service_healthy
    environment:
      - PORT=3000
      - DB_HOST=quadras-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=aluguel_quadras
      - JWT_SECRET=chave_secreta_do_grupo
      - MONGODB_URI=mongodb+srv://dpsantos:dpsantos45@integralplay.mnqvqnl.mongodb.net/?appName=IntegralPlay
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
