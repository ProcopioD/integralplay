name: Docker CI (FATEC DSM)

# O robozinho vai acordar toda vez que houver um Push na branch master
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # CORRIGIDO AQUI!
    steps:
    # Passo 1: Baixa o código do seu repositório para a máquina do GitHub
    - name: Checkout do código
      uses: actions/checkout@v4

    # Passo 2: Configura o ambiente do Docker na máquina virtual
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Passo 3: Testa se o Docker Compose está lendo os arquivos sem erros
    - name: Validar arquivos do Docker Compose
      run: docker compose config

    # Passo 4: Tenta simular o Build das imagens para ver se o código compila
    - name: Simular Build das Imagens
      run: docker compose build